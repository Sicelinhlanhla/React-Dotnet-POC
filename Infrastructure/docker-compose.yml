version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: poc_postgres
    environment:
      POSTGRES_DB: pocdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: Backend/POC.API/POC.API/Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: